name: Build & Release

on:
  workflow_dispatch:
    inputs:
      build_frontend:
        description: 'Build frontend before backend'
        required: true
        default: 'true'
        type: boolean
      release_tag:
        description: 'Release tag for manual runs (e.g. v0.1.1)'
        required: false
        type: string
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: timekeeping-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: timekeeping-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: timekeeping-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: timekeeping-macos-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Add cross-compilation targets (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build backend
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p release
          cp "target/${{ matrix.target }}/release/timekeeping${{ matrix.os == 'windows-latest' && '.exe' || '' }}" "release/${{ matrix.artifact_name }}"
          # Copy frontend build output (Vite outputs to frontend/dist/)
          if [ -d "frontend/dist" ]; then
            cp -r frontend/dist release/frontend-dist
          else
            echo "Warning: frontend/dist not found, creating empty directory"
            mkdir -p release/frontend-dist
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/

  desktop:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_os: ubuntu
          - os: windows-latest
            artifact_os: windows
          - os: macos-latest
            artifact_os: macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Linux dependencies for Tauri
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libsoup2.4-dev \
            libjavascriptcoregtk-4.0-dev \
            libwebkit2gtk-4.0-dev \
            libglib2.0-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Tauri CLI (npm)
        run: npm install -g @tauri-apps/cli@^1

      - name: Build desktop app (Tauri)
        run: |
          cd src-tauri
          tauri build --ci

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.artifact_os }}
          path: src-tauri/target/release/bundle/**

  release:
    needs: [build, desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "Manual run requires 'release_tag' input (e.g. v0.1.1)" >&2
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            artifacts/timekeeping-linux-x86_64/timekeeping-linux-x86_64
            artifacts/timekeeping-windows-x86_64.exe/timekeeping-windows-x86_64.exe
            artifacts/timekeeping-macos-x86_64/timekeeping-macos-x86_64
            artifacts/timekeeping-macos-aarch64/timekeeping-macos-aarch64
            artifacts/desktop-ubuntu/**/*.AppImage
            artifacts/desktop-ubuntu/**/*.deb
            artifacts/desktop-ubuntu/**/*.rpm
            artifacts/desktop-windows/**/*.msi
            artifacts/desktop-windows/**/*.exe
            artifacts/desktop-macos/**/*.dmg
            artifacts/desktop-macos/**/*.app.tar.gz
