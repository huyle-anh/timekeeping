name: Build & Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: timekeeping-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: timekeeping-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: timekeeping-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: timekeeping-macos-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Add cross-compilation target (macOS)
        if: matrix.os == 'macos-latest' && matrix.target == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build backend
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p release
          cp "target/${{ matrix.target }}/release/timekeeping${{ matrix.os == 'windows-latest' && '.exe' || '' }}" "release/${{ matrix.artifact_name }}"
          cp -r frontend/dist release/frontend-dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
